<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6b1f2e">
<title>Wishlist — Interactive Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#f5f0e6; --cream-dark:#ece4d3; --paper:#faf6ec;
  --ink:#2a1f1a; --ink-soft:#5a4a40;
  --burgundy:#6b1f2e; --burgundy-deep:#4a1520; --burgundy-soft:#8a3949;
  --brass:#b8893a; --brass-light:#d4a85a;
  --sage:#7a8970; --rose:#c87a7a;
  --shadow:rgba(42,31,26,0.12); --shadow-deep:rgba(42,31,26,0.25);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --tab-bar-h: calc(64px + var(--safe-bottom));
  --top-bar-h: 56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-size:16px;overscroll-behavior:none}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;
  background-image:radial-gradient(circle at 20% 10%,rgba(184,137,58,.04),transparent 40%),radial-gradient(circle at 80% 80%,rgba(107,31,46,.05),transparent 40%);
  -webkit-font-smoothing:antialiased}

/* ============== LOGIN ============== */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;
background:radial-gradient(circle at 30% 20%,rgba(107,31,46,.08),transparent 50%),radial-gradient(circle at 70% 80%,rgba(184,137,58,.1),transparent 50%),var(–cream)}
.login-card{background:var(–paper);border:1px solid var(–cream-dark);border-radius:8px;padding:2.5rem 2rem;max-width:420px;width:100%;box-shadow:0 30px 60px -20px var(–shadow-deep);position:relative}
.login-card::before{content:’’;position:absolute;inset:8px;border:1px solid var(–brass);border-radius:5px;pointer-events:none;opacity:.3}
.login-logo{text-align:center;margin-bottom:2rem;position:relative}
.login-logo h1{font-family:‘Fraunces’,serif;font-weight:400;font-size:2.5rem;letter-spacing:-.02em;color:var(–burgundy);font-style:italic}
.login-logo .subtitle{font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:var(–brass);margin-top:.5rem}

/* ============== FORM ============== */
.fg{margin-bottom:1.1rem}
.fg label{display:block;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(–ink-soft);margin-bottom:.5rem;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:.85rem 1rem;border:1px solid var(–cream-dark);background:var(–cream);border-radius:8px;font-family:inherit;font-size:1rem;color:var(–ink);transition:.2s;min-height:48px}
.fg textarea{min-height:80px;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(–burgundy);background:var(–paper)}

/* ============== BUTTONS ============== */
.btn{padding:.95rem 1.5rem;background:var(–burgundy);color:var(–paper);border:none;font-family:inherit;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:.2s;border-radius:8px;min-height:48px;display:inline-flex;align-items:center;justify-content:center}
.btn:hover{background:var(–burgundy-deep)}
.btn:active{transform:scale(0.98)}
.btn-full{width:100%}
.btn-ghost{padding:.7rem 1.1rem;background:transparent;border:1px solid var(–burgundy);color:var(–burgundy);font-family:inherit;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border-radius:8px;font-weight:500;transition:.15s;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
.btn-ghost:hover{background:var(–burgundy);color:var(–paper)}
.btn-sm{padding:.5rem .85rem;background:transparent;border:1px solid var(–cream-dark);color:var(–ink-soft);font-family:inherit;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:6px;transition:.15s;min-height:36px;display:inline-flex;align-items:center;justify-content:center}
.btn-sm:hover,.btn-sm:active{border-color:var(–burgundy);color:var(–burgundy)}
.btn-sm.danger{border-color:var(–burgundy-soft);color:var(–burgundy-soft)}
.btn-sm.active{border-color:var(–burgundy);color:var(–burgundy);background:var(–cream)}

/* ============== APP SHELL (mobile-first) ============== */
.app{display:none;min-height:100vh;flex-direction:column}
.app.active{display:flex}

/* Top bar */
.topbar{position:sticky;top:0;z-index:100;background:var(–paper);border-bottom:1px solid var(–cream-dark);
padding-top:var(–safe-top);height:calc(var(–top-bar-h) + var(–safe-top));
display:flex;align-items:center;justify-content:space-between;padding-left:1rem;padding-right:1rem;gap:.5rem}
.topbar-title{font-family:‘Fraunces’,serif;font-size:1.3rem;font-weight:500;font-style:italic;color:var(–burgundy);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-back{display:none;background:none;border:none;color:var(–burgundy);font-size:1.25rem;cursor:pointer;padding:.4rem;min-width:36px}
.topbar-back.show{display:flex;align-items:center;justify-content:center}
.topbar-actions{display:flex;align-items:center;gap:.25rem}
.icon-btn{background:none;border:none;color:var(–ink-soft);cursor:pointer;padding:.5rem;border-radius:50%;display:flex;align-items:center;justify-content:center;min-width:40px;min-height:40px;position:relative;transition:.15s}
.icon-btn:hover,.icon-btn:active{background:var(–cream);color:var(–burgundy)}
.icon-btn .dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(–burgundy);border-radius:50%;border:2px solid var(–paper)}

/* Main scroll area */
.main{flex:1;overflow-y:auto;padding-bottom:calc(var(–tab-bar-h) + 1rem);-webkit-overflow-scrolling:touch}

/* Bottom tab bar (primary mobile nav) */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(–paper);border-top:1px solid var(–cream-dark);z-index:90;
padding-bottom:var(–safe-bottom);box-shadow:0 -2px 20px -10px var(–shadow-deep)}
.tabbar-inner{display:flex;align-items:stretch;height:64px}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.2rem;cursor:pointer;color:var(–ink-soft);transition:.15s;text-decoration:none;padding:.4rem .2rem;position:relative;font-size:.65rem;letter-spacing:.05em}
.tab-item .ic{font-size:1.4rem;line-height:1}
.tab-item:hover{color:var(–ink)}
.tab-item.active{color:var(–burgundy)}
.tab-item.active::before{content:’’;position:absolute;top:0;left:25%;right:25%;height:3px;background:var(–burgundy);border-radius:0 0 3px 3px}
.tab-badge{position:absolute;top:.4rem;right:30%;background:var(–burgundy);color:var(–paper);font-size:.6rem;padding:1px 6px;border-radius:10px;font-weight:600;min-width:18px;text-align:center;line-height:1.4}

/* More menu drawer (for settings, howto) */
.drawer{position:fixed;bottom:-100%;left:0;right:0;background:var(–paper);border-top-left-radius:16px;border-top-right-radius:16px;
box-shadow:0 -20px 60px -20px var(–shadow-deep);transition:bottom .3s ease;z-index:200;padding-bottom:var(–safe-bottom);max-height:80vh;overflow-y:auto}
.drawer.open{bottom:0}
.drawer-handle{display:block;width:40px;height:4px;background:var(–cream-dark);border-radius:2px;margin:.75rem auto .5rem}
.drawer-content{padding:.5rem 1rem 1.5rem}
.drawer-item{display:flex;align-items:center;gap:1rem;padding:1rem .5rem;border-bottom:1px solid var(–cream-dark);cursor:pointer;transition:.15s}
.drawer-item:last-child{border-bottom:none}
.drawer-item:active{background:var(–cream)}
.drawer-item .ic{font-size:1.4rem;width:28px;text-align:center;color:var(–burgundy)}
.drawer-item .label{flex:1;font-size:1rem}
.drawer-item .arrow{color:var(–ink-soft);font-size:1rem}

/* ============== PAGE HEADER ============== */
.hdr{padding:1.5rem 1.25rem 1rem;background:var(–paper)}
.title{font-family:‘Fraunces’,serif;font-size:2rem;font-weight:400;color:var(–ink);letter-spacing:-.02em;line-height:1.05}
.title em{color:var(–burgundy);font-style:italic;font-weight:300}
.subtitle{font-size:.85rem;color:var(–ink-soft);margin-top:.4rem}
.actions{margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap}
.content{padding:.5rem 1.25rem 1.5rem}

/* ============== CARDS ============== */
.card-stack{display:flex;flex-direction:column;gap:.85rem}
.card{background:var(–paper);border:1px solid var(–cream-dark);border-radius:10px;padding:1.25rem;transition:.15s;position:relative;overflow:hidden}
.card.clickable{cursor:pointer}
.card.clickable::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;background:var(–brass);opacity:0;transition:.15s}
.card.clickable:hover{transform:translateY(-1px);box-shadow:0 8px 20px -8px var(–shadow);border-color:var(–brass)}
.card.clickable:active{transform:scale(0.99)}
.card.clickable:hover::before{opacity:1}

.ec-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem;margin-bottom:.85rem}
.ec-title{font-family:‘Fraunces’,serif;font-size:1.25rem;font-weight:500;line-height:1.2;letter-spacing:-.01em;flex:1;min-width:0}
.tag-event{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;padding:.25rem .6rem;border:1px solid var(–brass);color:var(–brass);border-radius:4px;background:var(–cream);flex-shrink:0;font-weight:500;white-space:nowrap}
.ec-meta{display:flex;flex-direction:column;gap:.45rem;color:var(–ink-soft);font-size:.85rem}
.ec-meta-item{display:flex;align-items:center;gap:.6rem}
.ec-meta-item .ic{color:var(–burgundy);width:14px;font-size:.85rem;flex-shrink:0}
.ec-stats{display:flex;gap:1rem;margin-top:.85rem;padding-top:.85rem;border-top:1px dashed var(–cream-dark);flex-wrap:wrap}
.stat{font-size:.78rem;color:var(–ink-soft)}
.stat strong{color:var(–ink);font-family:‘Fraunces’,serif;font-size:1.1rem;font-weight:500;margin-right:.35rem}
.stat .progress{color:var(–sage);font-weight:500}

/* Gift card — mobile-first stacked */
.gc{display:grid;grid-template-columns:64px 1fr;gap:1rem;align-items:start}
.gimg{width:64px;height:64px;border-radius:8px;background:linear-gradient(135deg,var(–cream),var(–cream-dark));display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0}
.ginfo{min-width:0}
.ginfo h3{font-family:‘Fraunces’,serif;font-size:1.1rem;font-weight:500;margin-bottom:.25rem;line-height:1.2}
.ginfo p{font-size:.82rem;color:var(–ink-soft);line-height:1.4;margin-bottom:.5rem}
.tags{display:flex;gap:.35rem;flex-wrap:wrap}
.tag{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;padding:.22rem .5rem;background:var(–cream);color:var(–ink-soft);border-radius:4px;border:1px solid var(–cream-dark)}
.tag.linked{color:var(–burgundy);border-color:var(–burgundy)}
.tag.claimed{color:var(–sage);border-color:var(–sage)}
.tag.partial{color:var(–brass);border-color:var(–brass)}
.tag.removed{color:var(–burgundy-soft);border-color:var(–burgundy-soft)}
.gprice{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;margin-top:.5rem;padding-top:.6rem;border-top:1px dashed var(–cream-dark)}
.gprice-amount{font-family:‘Fraunces’,serif;font-size:1.1rem;color:var(–burgundy);font-weight:500}
.gprice-amount small{font-family:‘Inter’;font-size:.7rem;color:var(–ink-soft);font-weight:400;margin-left:.4rem}

/* Stat tiles */
.home-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.5rem}
.sc{background:var(–paper);border:1px solid var(–cream-dark);padding:1rem;border-radius:10px;cursor:pointer;transition:.15s}
.sc:hover{border-color:var(–burgundy);transform:translateY(-1px)}
.sc:active{transform:scale(0.98)}
.sc-label{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(–ink-soft);margin-bottom:.4rem}
.sc-num{font-family:‘Fraunces’,serif;font-size:2rem;color:var(–burgundy);font-weight:400;line-height:1}
.sc-meta{font-size:.72rem;color:var(–ink-soft);margin-top:.4rem;line-height:1.3}

.section-label{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(–brass);margin:1.5rem 0 .85rem;font-weight:600;display:flex;align-items:center;gap:.75rem}
.section-label::after{content:’’;flex:1;height:1px;background:var(–cream-dark)}
.section-label:first-child{margin-top:0}

/* Detail hero */
.hero{color:var(–paper);padding:2rem 1.25rem;margin:-.5rem -1.25rem 1.25rem;position:relative;overflow:hidden;border-radius:0}
.hero::before{content:’’;position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(212,168,90,.2),transparent 50%);pointer-events:none}
.hero h1{font-family:‘Fraunces’,serif;font-size:2rem;font-weight:400;font-style:italic;margin-bottom:.5rem;position:relative;line-height:1.1}
.hero .meta{display:flex;flex-direction:column;gap:.4rem;font-size:.85rem;opacity:.92;position:relative}

.row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}

/* Privacy options */
.privacy-opts{display:flex;flex-direction:column;gap:.5rem;margin-top:.5rem}
.privacy-opt{border:1px solid var(–cream-dark);padding:.85rem 1rem;border-radius:8px;cursor:pointer;background:var(–cream);transition:.15s}
.privacy-opt:active{transform:scale(0.99)}
.privacy-opt.sel{border-color:var(–burgundy);background:var(–paper);box-shadow:inset 3px 0 0 var(–burgundy)}
.privacy-opt strong{font-family:‘Fraunces’,serif;font-weight:500;display:block;margin-bottom:.2rem;font-size:1rem}
.privacy-opt p{font-size:.78rem;color:var(–ink-soft)}

/* Theme swatches */
.swatches{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
.sw{width:48px;height:48px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;position:relative;flex-shrink:0}
.sw:active{transform:scale(0.95)}
.sw.sel{border-color:var(–ink);transform:scale(1.1)}
.sw.sel::after{content:‘✓’;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem}
.sw.locked::before{content:‘🔒’;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.95rem;background:rgba(0,0,0,.4);border-radius:50%;color:#fff}

/* Fractions (mobile-friendly) */
.frac-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-top:.75rem}
.frac{padding:.65rem .5rem;border:1px solid var(–cream-dark);background:var(–paper);font-family:‘Fraunces’,serif;font-size:1rem;cursor:pointer;border-radius:6px;color:var(–ink);transition:.15s;min-height:42px}
.frac:hover,.frac:active{border-color:var(–burgundy);color:var(–burgundy);background:var(–cream)}

/* Gift picker */
.gift-picker{border:1px solid var(–cream-dark);padding:.25rem .75rem;border-radius:8px;background:var(–cream);max-height:260px;overflow-y:auto}
.gift-picker label{display:flex;align-items:center;gap:.7rem;padding:.7rem 0;cursor:pointer;font-size:.95rem;border-bottom:1px solid var(–cream-dark);min-height:48px}
.gift-picker label:last-child{border-bottom:none}
.gift-picker input[type=checkbox]{width:20px;height:20px;flex-shrink:0;accent-color:var(–burgundy)}
.gift-picker .gp-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gift-picker .gp-price{color:var(–ink-soft);font-size:.78rem;flex-shrink:0}

/* Settings tabs */
.tabs{display:flex;border-bottom:1px solid var(–cream-dark);margin-bottom:1.5rem;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:.85rem 1rem;cursor:pointer;color:var(–ink-soft);font-size:.85rem;border-bottom:2px solid transparent;transition:.15s;margin-bottom:-1px;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(–burgundy);border-bottom-color:var(–burgundy);font-weight:500}

/* Toggle rows */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;border-bottom:1px solid var(–cream-dark);gap:1rem}
.toggle-row:last-child{border-bottom:none}
.toggle-row .info{flex:1;min-width:0}
.toggle-row .info strong{display:block;margin-bottom:.2rem;font-weight:500;font-size:.92rem}
.toggle-row .info p{font-size:.78rem;color:var(–ink-soft)}
.toggle{width:48px;height:28px;background:var(–cream-dark);border-radius:14px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle::after{content:’’;position:absolute;top:3px;left:3px;width:22px;height:22px;background:var(–paper);border-radius:50%;transition:.2s;box-shadow:0 1px 3px var(–shadow)}
.toggle.on{background:var(–burgundy)}
.toggle.on::after{transform:translateX(20px)}

/* Howto */
.howto-step{display:grid;grid-template-columns:48px 1fr;gap:1rem;margin-bottom:2rem}
.howto-num{font-family:‘Fraunces’,serif;font-size:2.2rem;color:var(–burgundy);font-style:italic;line-height:1;border-right:1px solid var(–brass);padding-right:.75rem;text-align:right}
.howto-content h3{font-family:‘Fraunces’,serif;font-size:1.2rem;font-weight:500;margin-bottom:.4rem}
.howto-content p{color:var(–ink-soft);line-height:1.5;margin-bottom:.6rem;font-size:.92rem}
.howto-content ul{list-style:none;padding:0}
.howto-content li{padding-left:1.1rem;position:relative;font-size:.85rem;color:var(–ink-soft);margin-bottom:.35rem;line-height:1.4}
.howto-content li::before{content:‘◆’;position:absolute;left:0;color:var(–brass);font-size:.55rem;top:.45rem}

/* Banner */
.banner{background:var(–cream);border:1px solid var(–brass);border-left:4px solid var(–brass);padding:.9rem 1rem;border-radius:6px;margin-bottom:1.25rem;font-size:.85rem;line-height:1.4}
.banner strong{color:var(–burgundy)}
.banner.success{border-color:var(–sage);border-left-color:var(–sage)}
.banner.success strong{color:var(–sage)}
.banner.warn{border-color:var(–burgundy-soft);border-left-color:var(–burgundy-soft)}
.banner.warn strong{color:var(–burgundy-soft)}

/* Modal — bottom sheet on mobile */
.modal-bg{position:fixed;inset:0;background:rgba(42,31,26,.55);display:none;align-items:flex-end;justify-content:center;z-index:1000}
.modal-bg.active{display:flex;animation:fadeIn .2s}
.modal{background:var(–paper);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:1.5rem 1.25rem calc(1.5rem + var(–safe-bottom));
border-top-left-radius:16px;border-top-right-radius:16px;animation:slideUp .25s ease}
.modal::before{content:’’;display:block;width:40px;height:4px;background:var(–cream-dark);border-radius:2px;margin:0 auto 1rem}
.modal h2{font-family:‘Fraunces’,serif;font-size:1.4rem;font-weight:500;margin-bottom:.5rem;line-height:1.2}
.modal p{color:var(–ink-soft);margin-bottom:1rem;font-size:.9rem;line-height:1.5}
.modal-actions{display:flex;flex-direction:column;gap:.5rem;margin-top:1.25rem}
.modal-actions .btn-sm{order:2;align-self:stretch;justify-content:center}
.modal-actions .btn{order:1}
.modal-actions.row-actions{flex-direction:row;flex-wrap:wrap;align-items:center}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Notification panel — full screen on mobile */
.notif-panel{position:fixed;top:0;right:-100%;width:100%;max-width:420px;height:100vh;background:var(–paper);
box-shadow:-10px 0 40px -10px var(–shadow-deep);transition:right .25s;z-index:500;overflow-y:auto;
padding-top:var(–safe-top);padding-bottom:var(–safe-bottom)}
.notif-panel.open{right:0}
.notif-head{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid var(–cream-dark);display:flex;justify-content:space-between;align-items:center}
.notif-head h3{font-family:‘Fraunces’,serif;font-size:1.3rem;font-weight:500}
.notif-close{cursor:pointer;padding:.5rem;color:var(–ink-soft);border:none;background:none;font-size:1.4rem;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.notif-close:active{background:var(–cream)}
.notif-item{padding:1rem 1.25rem;border-bottom:1px solid var(–cream-dark);cursor:pointer;transition:.15s}
.notif-item:active{background:var(–cream)}
.notif-item.unread{background:rgba(184,137,58,.06)}
.notif-item .nt{font-weight:500;font-size:.9rem;margin-bottom:.25rem;line-height:1.3}
.notif-item .nm{font-size:.75rem;color:var(–ink-soft)}

/* Toast */
.toast{position:fixed;bottom:calc(var(–tab-bar-h) + 1rem);left:50%;transform:translateX(-50%) translateY(40px);background:var(–ink);color:var(–paper);padding:.85rem 1.25rem;border-radius:6px;font-size:.85rem;z-index:2000;opacity:0;transition:.3s;box-shadow:0 10px 30px -10px var(–shadow-deep);max-width:90%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Test panel */

.test-panel button:active{background:rgba(255,255,255,.15)}

.test-panel.collapsed .test-panel-body{display:none}
.test-panel.collapsed .test-panel-title{margin:0}

/* Empty */
.empty{text-align:center;padding:2.5rem 1.5rem;color:var(–ink-soft);background:var(–paper);border:1px dashed var(–cream-dark);border-radius:10px}
.empty h3{font-family:‘Fraunces’,serif;font-size:1.25rem;margin-bottom:.5rem;color:var(–ink);font-weight:500}

a.link{color:var(–burgundy);text-decoration:none;cursor:pointer}

.contact-row{background:var(–cream);padding:.85rem 1rem;border-radius:8px;margin:.75rem 0;font-size:.88rem;border-left:3px solid var(–brass);line-height:1.6}
.contact-row strong{display:block;margin-bottom:.3rem;color:var(–ink)}

.subscription-card{background:var(–paper);border:1px solid var(–cream-dark);padding:1.25rem;border-radius:10px;margin-bottom:1rem}
.tier-pill{display:inline-block;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(–brass);border:1px solid var(–brass);padding:.15rem .55rem;border-radius:4px}
.tier-pill.paid{color:var(–burgundy);border-color:var(–burgundy);background:var(–cream)}

/* ============== DESKTOP (768px+) ============== */
@media (min-width:768px){

.topbar{display:none}
.tabbar{position:sticky;top:0;left:auto;right:auto;bottom:auto;width:240px;height:100vh;border-top:none;border-right:1px solid var(–cream-dark);padding-bottom:0;flex-shrink:0;box-shadow:none}

.tab-item.active{background:var(–cream);border-left-color:var(–burgundy)}
.tab-item.active::before{display:none}
.tab-badge{position:static;margin-left:auto;background:var(–burgundy);font-size:.65rem;padding:.1rem .5rem}
.tabbar-inner::before{content:‘Wishlist’;display:block;font-family:‘Fraunces’,serif;font-style:italic;font-size:1.7rem;color:var(–burgundy);padding:0 1.5rem 1.5rem;border-bottom:1px solid var(–cream-dark);margin-bottom:1rem}
.main{height:100vh;padding-bottom:1.5rem}
.hdr{padding:2.5rem 3rem 1.5rem;border-bottom:1px solid var(–cream-dark);position:sticky;top:0;z-index:10;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.hdr-content{flex:1;min-width:0}

.title{font-size:2.5rem}
.content{padding:2rem 3rem 4rem;max-width:900px}
.card-stack{max-width:780px}
.home-grid{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));max-width:780px;gap:1rem}
.sc{padding:1.5rem}
.sc-num{font-size:2.4rem}
.hero{margin:-2rem -3rem 1.5rem;padding:3rem;border-radius:0}
.hero h1{font-size:2.8rem}
.hero .meta{flex-direction:row;gap:1.5rem;flex-wrap:wrap;font-size:.9rem}

}

/* Very small phones */

<body>

<!-- LOGIN -->

<script>
// ============== STATE ==============
const STATE = {

  theme: 'burgundy',

  settingsTab: 'account',
  events: [], gifts: [], notifs: []
};

const THEMES = {
  burgundy: { primary:'#6b1f2e', deep:'#4a1520', soft:'#8a3949', accent:'#b8893a', accentL:'#d4a85a', cream:'#f5f0e6', creamD:'#ece4d3', paper:'#faf6ec', ink:'#2a1f1a', inkS:'#5a4a40' },
  sage:    { primary:'#4a5a3e', deep:'#324028', soft:'#6a7a5a', accent:'#a89860', accentL:'#c4b884', cream:'#eef0e8', creamD:'#dde1d2', paper:'#f5f7ee', ink:'#1f2a1a', inkS:'#475040' },
  brass:   { primary:'#9a6e22', deep:'#6e4e15', soft:'#b88c3a', accent:'#6b4a2a', accentL:'#a8784a', cream:'#f5efde', creamD:'#ebe0c5', paper:'#faf4e3', ink:'#2a2218', inkS:'#5a4d36' },
  navy:    { primary:'#2a4a6b', deep:'#15304a', soft:'#4a6a8b', accent:'#b8893a', accentL:'#d4a85a', cream:'#e8ecf2', creamD:'#cfd6e0', paper:'#f0f3f8', ink:'#15212e', inkS:'#3d4d60' },
  rose:    { primary:'#a04a4a', deep:'#7a2e2e', soft:'#c87a7a', accent:'#a8784a', accentL:'#c49870', cream:'#f7ecec', creamD:'#ecd5d5', paper:'#fbf2f2', ink:'#2e1a1a', inkS:'#603e3e' },
  ink:     { primary:'#2a1f1a', deep:'#15100c', soft:'#5a4a40', accent:'#b8893a', accentL:'#d4a85a', cream:'#e8e4de', creamD:'#d0c9bd', paper:'#f0ece6', ink:'#0f0a07', inkS:'#3a322a' }
};

const ICONS = ['🎁','📚','🎧','🌿','🍷','🍳','📷','🖼️','🥂','🎟️','📖','🛋️','🍽️','🧣','🧴','🎨','⌚','🎮','🌸','🕯️','🧸','💐','🍰','📺'];
const EVENT_TYPES = ['Birthday','Wedding','Housewarming','Anniversary','Christmas','Baby shower','Engagement','Graduation','Other'];

// ============== SEED ==============
function seedData() {
  STATE.events = [
    { id:'e1', title:"Sam's 35th", type:'Birthday', date:'2026-05-23', time:'19:00', location:'Our place, Brunswick', hostId:'me', invitees:14, privacy:'direct', theme:'burgundy', giftIds:['g1','g2','g3','g4'], claims:{ g1:[{userId:'guest1',fraction:1}], g4:[{userId:'guest2',fraction:1}], g2:[{userId:'guest3',fraction:0.5}] } },
    { id:'e2', title:"Pat & Jo's 40th", type:'Anniversary', date:'2026-06-13', time:'18:30', location:'The Hotel Windsor', hostId:'me', invitees:32, privacy:'plusone', theme:'sage', giftIds:['g7','g8','g9'], claims:{ g7:[{userId:'guest4',fraction:1}] } },
    { id:'e3', title:'Christmas in July', type:'Christmas', date:'2026-07-25', time:'16:00', location:"Ruth's house", hostId:'me', invitees:9, privacy:'direct', theme:'rose', giftIds:['g2','g10'], claims:{} },
    { id:'e4', title:"Ruth's housewarming", type:'Housewarming', date:'2026-05-17', time:'18:00', location:'Northcote', hostId:'host1', hostName:'Ruth Perry', invitees:18, privacy:'plusone', theme:'sage', giftIds:['gh1','gh2','gh3','gh4'], claims:{ gh1:[{userId:'me',fraction:1}], gh2:[{userId:'maddy',fraction:0.5}] }, isInvite:true },
    { id:'e5', title:"Jess & Tom's wedding", type:'Wedding', date:'2026-06-07', time:'15:00', location:'Stones of the Yarra Valley', hostId:'host2', hostName:'Jess M.', invitees:80, privacy:'direct', theme:'rose', giftIds:['gh5','gh6','gh7'], claims:{}, isInvite:true },
    { id:'e6', title:"Liam's 40th", type:'Birthday', date:'2026-06-21', time:'20:00', location:'The Gem Bar, Collingwood', hostId:'host3', hostName:'Liam K.', invitees:24, privacy:'direct', theme:'ink', giftIds:['gh8'], claims:{ gh8:[{userId:'me',fraction:1,bought:true}] }, isInvite:true }
  ];
  STATE.gifts = [
    { id:'g1', icon:'📚', name:'Sally Rooney trilogy', desc:'Dymocks. Hardback, gift-wrap.', price:120, link:'#' },
    { id:'g2', icon:'🎧', name:'Sony WH-1000XM5', desc:'Black. JB Hi-Fi.', price:549, link:'#' },
    { id:'g3', icon:'🌿', name:'Monstera plant', desc:'Medium, terracotta pot.', price:80, link:'#' },
    { id:'g4', icon:'🍷', name:'Mornington wine pack', desc:'Mixed case from Vinomofo.', price:180, link:'#' },
    { id:'g5', icon:'🍳', name:'Le Creuset casserole', desc:'26cm, cherry red.', price:549, link:'#' },
    { id:'g6', icon:'📷', name:'Instax mini camera', desc:'Pastel green.', price:129, link:'#' },
    { id:'g7', icon:'🥂', name:'Champagne hamper', desc:'Veuve and accompaniments.', price:280, link:'#' },
    { id:'g8', icon:'🖼️', name:'Custom photo book', desc:'40 years in pictures.', price:120, link:'#' },
    { id:'g9', icon:'🎟️', name:'Theatre tickets', desc:'Show TBD.', price:200, link:'#' },
    { id:'g10', icon:'🧣', name:'Cashmere scarf', desc:'Forest green.', price:180, link:'#' },
    { id:'gh1', icon:'🍳', name:'Le Creuset casserole', desc:'Cherry red. House of Knives.', price:549, link:'#', ownerId:'host1' },
    { id:'gh2', icon:'🛋️', name:'Velvet throw cushions', desc:'Forest green pair. West Elm.', price:220, link:'#', ownerId:'host1' },
    { id:'gh3', icon:'🍷', name:'Riedel wine glass set', desc:'Burgundy glasses, set of 6.', price:320, link:'#', ownerId:'host1' },
    { id:'gh4', icon:'📖', name:'Ottolenghi Comfort cookbook', desc:'Hardback. Readings.', price:60, link:'#', ownerId:'host1' },
    { id:'gh5', icon:'🍽️', name:'Serving platter set', desc:'Linen ceramic.', price:240, link:'#', ownerId:'host2' },
    { id:'gh6', icon:'🥂', name:'Crystal champagne flutes', desc:'Set of 4.', price:180, link:'#', ownerId:'host2' },
    { id:'gh7', icon:'📚', name:'Yarra Valley coffee table book', desc:'Photography.', price:75, link:'#', ownerId:'host2' },
    { id:'gh8', icon:'🍷', name:'Penfolds Bin 389', desc:'Vintage bottle.', price:95, link:'#', ownerId:'host3' }
  ];
  STATE.notifs = [
    { id:'n1', title:'Reveal unlocked: house warming', meta:'2 days ago', read:false },
    { id:'n2', title:'Maddy J. chipped in on a gift', meta:'4 days ago', read:false },
    { id:'n3', title:"Jess & Tom's wedding — invite received", meta:'1 week ago', read:true }
  ];
}

// ============== UTILS ==============
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
const esc = (s) => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function applyTheme(name) {
  const t = THEMES[name] || THEMES.burgundy;
  const r = document.documentElement;
  r.style.setProperty('--cream', t.cream);
  r.style.setProperty('--cream-dark', t.creamD);
  r.style.setProperty('--paper', t.paper);
  r.style.setProperty('--ink', t.ink);
  r.style.setProperty('--ink-soft', t.inkS);
  r.style.setProperty('--burgundy', t.primary);
  r.style.setProperty('--burgundy-deep', t.deep);
  r.style.setProperty('--burgundy-soft', t.soft);
  r.style.setProperty('--brass', t.accent);
  r.style.setProperty('--brass-light', t.accentL);
  STATE.theme = name;
  const meta = document.querySelector('meta[name=theme-color]');
  if (meta) meta.setAttribute('content', t.primary);
}

function fmtDate(d, t) {
  const date = new Date(d + 'T' + (t||'00:00'));
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let timeStr = '';
  if (t) {
    let h = date.getHours();
    const m = date.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    timeStr = ' · ' + h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
  }
  return `${days[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]}${timeStr}`;
}

function daysUntil(d) { return Math.round((new Date(d) - new Date('2026-05-10')) / 86400000); }
function isReveal(e) { if (STATE.reveal) return true; return daysUntil(e.date) < -3; }
function giftFraction(e, gid) { return ((e.claims||{})[gid] || []).reduce((s,c) => s + c.fraction, 0); }
function giftClaims(e, gid) { return ((e.claims||{})[gid] || []); }
function myClaim(e, gid) { return giftClaims(e, gid).find(c => c.userId === 'me'); }
function getGift(id) { return STATE.gifts.find(g => g.id === id); }
function getEvent(id) { return STATE.events.find(e => e.id === id); }

function fracLabel(f) {
  if (f === 1) return 'full';
  if (f === 0.5) return '1/2';
  if (f === 0.25) return '1/4';
  if (f === 0.75) return '3/4';
  if (Math.abs(f - 1/3) < 0.01) return '1/3';
  if (Math.abs(f - 2/3) < 0.01) return '2/3';
  return Math.round(f*100) + '%';
}

// ============== NAV (bottom tab bar) ==============
function renderTabbar() {
  const myEvents = STATE.events.filter(e => !e.isInvite && daysUntil(e.date) > -3).length;
  const wishCount = STATE.gifts.filter(g => !g.ownerId).length;
  const inviteCount = STATE.events.filter(e => e.isInvite && daysUntil(e.date) > -3).length;
  const shopCount = STATE.events.filter(e => e.isInvite).reduce((s,e) => s + Object.values(e.claims||{}).flat().filter(c=>c.userId==='me').length, 0);

  const items = [
    { k:'home', i:'⌂', l:'Home' },
    { k:'events', i:'✦', l:'Events', b: myEvents },
    { k:'wishlist', i:'♡', l:'Wishlist', b: wishCount },
    { k:'invites', i:'✉', l:'Invites', b: inviteCount },
    { k:'shopping', i:'◈', l:'Shopping', b: shopCount }
  ];
  const isActive = (k) => STATE.page === k
    || (k === 'events' && ['eventDetail','editEvent','createEvent'].includes(STATE.page))
    || (k === 'invites' && STATE.page === 'inviteDetail');

  $('#tabbar').innerHTML = items.map(it => `
    <div class="tab-item ${isActive(it.k)?'active':''}" onclick="navTo('${it.k}')" role="button">
      <span class="ic">${it.i}</span>
      <span>${it.l}</span>
      ${it.b ? `<span class="tab-badge">${it.b}</span>` : ''}
    </div>
  `).join('');

  $('#notif-dot').style.display = STATE.notifs.some(n=>!n.read) ? 'block' : 'none';

  // Top title
  const titleMap = { home:'Wishlist', events:'My Events', wishlist:'Wishlist', invites:'Invites', shopping:'Shopping',
    eventDetail:'Event', createEvent:'New Event', editEvent:'Edit Event', inviteDetail:'Invite',
    settings:'Settings', howto:'How it works' };
  $('#top-title').textContent = titleMap[STATE.page] || 'Wishlist';
  $('#back-btn').classList.toggle('show', ['eventDetail','createEvent','editEvent','inviteDetail','settings','howto'].includes(STATE.page));
}

// ============== EVENT CARD ==============
function eventCard(e) {
  const claimed = Object.keys(e.claims||{}).length;
  const total = e.giftIds.length;
  const d = daysUntil(e.date);
  const word = d > 0 ? 'days away' : d === 0 ? 'today' : 'days ago';
  const mine = e.isInvite ? Object.values(e.claims||{}).flat().filter(c=>c.userId==='me').length : 0;
  return `
    <div class="card clickable" onclick="openEvent('${e.id}')">
      <div class="ec-head">
        <div class="ec-title">${esc(e.title)}</div>
        <span class="tag-event">${esc(e.type)}</span>
      </div>
      <div class="ec-meta">
        <div class="ec-meta-item"><span class="ic">◷</span>${fmtDate(e.date, e.time)}</div>
        <div class="ec-meta-item"><span class="ic">◉</span>${esc(e.location)}</div>
        <div class="ec-meta-item"><span class="ic">◇</span>${e.isInvite ? 'Hosted by ' + esc(e.hostName) : e.invitees + ' invitees'}</div>
        <div class="ec-meta-item"><span class="ic">⊕</span>${total} gift${total===1?'':'s'} listed</div>
      </div>
      <div class="ec-stats">
        ${e.isInvite
          ? `<div class="stat"><strong>${mine}</strong><span class="progress">you've claimed</span></div>
             <div class="stat"><strong>${total - claimed}</strong>still available</div>`
          : `<div class="stat"><strong>${e.invitees}</strong>going</div>
             <div class="stat"><strong>${claimed}</strong><span class="progress">claimed</span></div>`}
        <div class="stat"><strong>${Math.abs(d)}</strong>${word}</div>
      </div>
    </div>
  `;
}

// ============== PAGE: HOME ==============
function pageHome() {
  const wishCount = STATE.gifts.filter(g => !g.ownerId).length;
  const myEvents = STATE.events.filter(e => !e.isInvite).sort((a,b) => a.date.localeCompare(b.date));
  const myUp = myEvents.filter(e => daysUntil(e.date) > -3);

  const recentReveal = STATE.events.find(e => !e.isInvite && daysUntil(e.date) < -3 && daysUntil(e.date) > -90);
  const soonest = myUp.slice(0,2);

  return `

        <div class="sc" onclick="navTo('events')"><div class="sc-label">My events</div><div class="sc-num">${myUp.length}</div><div class="sc-meta">${STATE.user.tier==='paid'?'unlimited':Math.max(0,2-myUp.length)+' slots left'}</div></div>
        <div class="sc" onclick="navTo('invites')"><div class="sc-label">Invites</div><div class="sc-num">${inviteCount}</div><div class="sc-meta">parties</div></div>
        <div class="sc" onclick="navTo('shopping')"><div class="sc-label">Shopping</div><div class="sc-num">${claims}</div><div class="sc-meta">${claims-bought} to buy</div></div>

      <div class="section-label">Soonest events</div>
      ${soonest.length === 0

}

function pageEventDetail() {
  const e = getEvent(STATE.eventId);
  if (!e) return `<div class="content"><div class="empty"><h3>Event not found</h3></div></div>`;
  const reveal = isReveal(e);
  const claimed = Object.keys(e.claims||{}).length;
  const total = e.giftIds.length;
  const th = THEMES[e.theme] || THEMES.burgundy;

  return `
    <div class="content">
      <div class="hero" style="background:linear-gradient(135deg, ${th.primary} 0%, ${th.deep} 100%);">
        <h1>${esc(e.title)}</h1>
        <div class="meta">
          <span>◷ ${fmtDate(e.date, e.time)}</span>
          <span>◉ ${esc(e.location)}</span>
          <span>◇ ${e.invitees} invitees</span>
          <span>⊕ ${total} gifts</span>
        </div>
      </div>

      ${reveal
        ? `<div class="banner success"><strong>Reveal unlocked.</strong> Here's who claimed and brought what — mark thank-yous as you send them.</div>`
        : `<div class="banner"><strong>You're the host.</strong> Claims are hidden until 3 days after the event. So far: ${claimed} of ${total} gifts have at least one claim.</div>`}

      <div class="actions" style="margin-bottom:1.25rem">
        <button class="btn-ghost" onclick="openEditEvent('${e.id}')">Edit event</button>
        <button class="btn-sm" onclick="copyShareLink('${e.id}')">Share link</button>
        <button class="btn-sm danger" onclick="confirmCancelEvent('${e.id}')">Cancel</button>
      </div>

      <div class="section-label">Linked gifts</div>
      <div class="card-stack">
        ${total === 0 ? `<div class="empty"><h3>No gifts linked yet</h3><p>Add gifts from your wishlist.</p><button class="btn-ghost" onclick="openEditEvent('${e.id}')">Link gifts</button></div>` :
        e.giftIds.map(gid => {
          const g = getGift(gid);
          if (!g) return '';
          const frac = giftFraction(e, gid);
          const claims = giftClaims(e, gid);
          let tag;
          if (frac >= 0.999) tag = '<span class="tag claimed">Fully claimed</span>';
          else if (frac > 0) tag = `<span class="tag partial">${Math.round(frac*100)}% claimed</span>`;
          else tag = '<span class="tag">Available</span>';

          let extra = '';
          if (reveal && claims.length) {
            const names = claims.map(c => `${c.userId==='me'?'You':'Guest '+c.userId.slice(-1)}${c.bought?' (bought ✓)':''}`).join(', ');
            extra = `<div style="margin-top:.5rem;font-size:.82rem;color:var(--ink-soft);line-height:1.4">From: <em>${esc(names)}</em></div>
              <button class="btn-sm" style="margin-top:.5rem" onclick="markThanked()">Mark thanked</button>`;
          }

          return `
            <div class="card gc">
              <div class="gimg">${g.icon}</div>
              <div class="ginfo">
                <h3>${esc(g.name)}</h3>
                <p>${esc(g.desc)}</p>
                <div class="tags">${tag}</div>
                ${extra}
              </div>
              <div class="gprice"><div class="gprice-amount">≈ A$${g.price}</div></div>
            </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function saveNewEvent() {
  const title = $('#ce-title').value.trim();
  if (!title) { toast('Title required'); return; }
  if (STATE.user.tier === 'free' && STATE.events.filter(e=>!e.isInvite && daysUntil(e.date) > -3).length >= 2) {
    showFreeTierModal(); return;
  }
  const giftIds = $$('.gift-picker input[type=checkbox]:checked').map(c => c.dataset.gift);
  const privacy = ($('.privacy-opt.sel') || {}).dataset?.p || 'direct';
  const theme = ($('#ce-theme .sw.sel') || {}).dataset?.t || 'burgundy';
  STATE.events.push({
    id: 'e' + Date.now(), title,
    type: $('#ce-type').value, date: $('#ce-date').value, time: $('#ce-time').value,
    location: $('#ce-location').value || 'TBC',

          <a class="btn-sm" href="${g.link}" target="_blank" rel="noopener" style="text-decoration:none">Open retailer ↗</a>
        </div>`;
      } else if (frac < 0.999) {
        const opts = fractions.filter(o => o.f <= remaining + 0.01).map(o => `
          <button class="frac" onclick="claimGift('${e.id}','${gid}',${o.f})">${o.l}</button>
        `).join('');
        claimUI = `<div class="frac-opts">${opts}</div>`;
      } else {
        claimUI = '<p style="font-size:.8rem;color:var(--ink-soft);margin-top:.5rem">No spots left</p>';
      }

      return `
        <div class="card gc">
          <div class="gimg">${g.icon}</div>
          <div class="ginfo">
            <h3>${esc(g.name)}</h3>
            <p>${esc(g.desc)}</p>
            <div class="tags">${tag}</div>
            ${claimUI}
          </div>
          <div class="gprice"><div class="gprice-amount">≈ A$${g.price}</div></div>
        </div>`;
    }).join('')}
  </div>
</div>
```

`;
}

function claimGift(eventId, giftId, fraction) {
const e = getEvent(eventId);
if (!e) return;
e.claims = e.claims || {};
const existing = e.claims[giftId] || [];
e.claims[giftId] = existing;
existing.push({ userId:‘me’, fraction, bought:false });
const total = giftFraction(e, giftId);

if (existing.length > 1 && total >= 0.999) {
const other = existing.find(c => c.userId !== ‘me’);
const otherName = other && other.userId === ‘maddy’ ? ‘Maddy J.’ : ‘A fellow guest’;
showModal(`<h2>Chip-in match found</h2> <p>You've completed this gift with another guest. Reach out to sort who buys and brings it.</p> <div class="contact-row"> <strong>${otherName}</strong> 📧 maddy@example.com<br> 📱 +61 4XX XXX XXX </div> <p style="font-size:.82rem;color:var(--ink-soft)">Once one of you marks it bought, the other is notified.</p> <div class="modal-actions"><button class="btn" onclick="closeModal()">Got it</button></div>`);
STATE.notifs.unshift({ id:‘n’+Date.now(), title:‘Chip-in match completed’, meta:‘Just now’, read:false });
} else {
toast(fraction === 1 ? ‘Claimed — added to shopping list’ : `Claimed ${fracLabel(fraction)} — waiting for chip-in partner`);
}
render();
}

function dropClaim(eventId, giftId) {
const e = getEvent(eventId);
if (!e) return;
e.claims[giftId] = (e.claims[giftId] || []).filter(c => c.userId !== ‘me’);
if (e.claims[giftId].length === 0) delete e.claims[giftId];
toast(‘Claim released’);
render();
}

function markBought(eventId, giftId) {
const e = getEvent(eventId);
const claim = (e.claims[giftId] || []).find(c => c.userId === ‘me’);
if (claim) claim.bought = true;
toast(‘Marked bought’);
render();
}

function markThanked() { toast(‘Thanked ✓’); }

function pageShopping() {
const items = [];
STATE.events.filter(e => e.isInvite).forEach(e => {
Object.entries(e.claims || {}).forEach(([gid, claims]) => {
claims.filter(c => c.userId === ‘me’).forEach(c => {
const g = getGift(gid);
if (g) items.push({ event: e, gift: g, claim: c });
});

return `<header class="hdr"> <div class="hdr-content"> <h1 class="title">Shopping <em>List</em></h1> <p class="subtitle">${items.length} items · ${items.filter(i=>!i.claim.bought).length} to buy · ${items.filter(i=>i.claim.bought).length} bought</p> </div> </header> <div class="content"> ${items.length === 0 ?`<div class="empty"><h3>Nothing committed yet</h3><p>Claim gifts on your invites.</p><button class="btn-ghost" onclick="navTo('invites')">View invites</button></div>`:`<div class="card-stack">${items.map(it => {
const fl = it.claim.fraction === 1 ? ‘Full claim’ : `${fracLabel(it.claim.fraction)} (chip in)`;

// ============== NAV / RENDER ==============
function navTo(page) {
if (STATE.page !== page) STATE.history.push(STATE.page);
STATE.page = page;
render();
$(’.main’).scrollTo({ top: 0, behavior: ‘auto’ });
}

function goBack() {
if (STATE.history.length > 0) {
STATE.page = STATE.history.pop();
render();
$(’.main’).scrollTo({ top: 0, behavior: ‘auto’ });
} else {
navTo(‘home’);
}
}

function openEvent(id) {
const e = getEvent(id);
if (!e) return;
STATE.history.push(STATE.page);
STATE.eventId = id;
STATE.page = e.isInvite ? ‘inviteDetail’ : ‘eventDetail’;
render();
$(’.main’).scrollTo({ top: 0, behavior: ‘auto’ });
}

function render() {
let html;
switch (STATE.page) {
case ‘home’: html = pageHome(); break;
case ‘events’: html = pageEvents(); break;
case ‘eventDetail’: html = pageEventDetail(); break;
case ‘createEvent’: html = pageCreateEvent(); break;
case ‘editEvent’: html = pageCreateEvent(STATE.eventId); break;
case ‘wishlist’: html = pageWishlist(); break;
case ‘invites’: html = pageInvites(); break;
case ‘inviteDetail’: html = pageInviteDetail(); break;
case ‘shopping’: html = pageShopping(); break;
case ‘howto’: html = pageHowto(); break;
case ‘settings’: html = pageSettings(); break;
default: html = pageHome();
}
$(’#page’).innerHTML = html;
renderTabbar();
renderNotifs();
}

$(’#more-drawer-bg’).style.display = ‘flex’;
STATE.moreOpen = true;
}

function closeMoreMenu() {
$(’#more-drawer-bg’).style.display = ‘none’;
STATE.moreOpen = false;
}

function toggleNotifs() {
STATE.notifsOpen = !STATE.notifsOpen;

// ============== MODAL / TOAST ==============
function showModal(html) {
$(’#modal-content’).innerHTML = html;
$(’#modal’).classList.add(‘active’);
}
function closeModal() { $(’#modal’).classList.remove(‘active’); }

let toastTimer;
function toast(msg) {
const t = $(’#toast’);
t.textContent = msg;
t.classList.add(‘show’);
clearTimeout(toastTimer);
toastTimer = setTimeout(() => t.classList.remove(‘show’), 2400);
}

// ============== TEST PANEL ==============
function toggleTestPanel() {
$(’#test-panel’).classList.toggle(‘collapsed’);
}

function toggleTier() {
STATE.user.tier = STATE.user.tier === ‘free’ ? ‘paid’ : ‘free’;
$(’#btn-tier’).classList.toggle(‘on’, STATE.user.tier === ‘paid’);
$(’#btn-tier’).textContent = STATE.user.tier === ‘paid’ ? ‘Paid ✓’ : ‘Free/Paid’;

$(’#btn-reveal’).classList.toggle(‘on’, STATE.reveal);
$(’#btn-reveal’).textContent = STATE.reveal ? ‘Reveal ✓’ : ‘Reveal’;
toast(STATE.reveal ? ‘Reveal mode on’ : ‘Reveal mode off’);

}

function resetData() {
showModal(`<h2>Reset mockup?</h2><p>All changes wiped, demo data restored.</p> <div class="modal-actions"> <button class="btn" onclick="doReset()">Reset</button> <button class="btn-sm" onclick="closeModal()">Cancel</button> </div>`);
}

function doReset() {
seedData();
STATE.user.tier = ‘free’; STATE.reveal = false; STATE.theme = ‘burgundy’;
STATE.page = ‘home’; STATE.settingsTab = ‘account’; STATE.wishFilter = ‘all’;
STATE.history = [];

$(’#btn-reveal’).classList.remove(‘on’); $(’#btn-reveal’).textContent = ‘Reveal’;
closeModal(); toast(‘Reset’); render();
}

// ============== ENTER ==============
function enterApp() {
$(’#login’).style.display = ‘none’;
$(’#app’).classList.add(‘active’);
seedData();
applyTheme(‘burgundy’);
STATE.page = ‘home’;
STATE.history = [];
render();
}

function goToLogin() {
closeMoreMenu();
$(’#app’).classList.remove(‘active’);
$(’#login’).style.display = ‘flex’;
}

seedData();
</script>
